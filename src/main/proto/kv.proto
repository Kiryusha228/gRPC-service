syntax = "proto3";

option java_multiple_files = true;
option java_package = "kv.grpc";

service KvService {
  rpc Put(PutRequest) returns (Empty);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (Empty);
  rpc Range(RangeRequest) returns (stream KeyValue);
  rpc Count(Empty) returns (CountResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
}

message DeleteRequest {
  string key = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message KeyValue {
  string key = 1;
  bytes value = 2;
}

message CountResponse {
  int64 count = 1;
}

message Empty {}